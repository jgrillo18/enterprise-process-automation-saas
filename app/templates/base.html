<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Automation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Enterprise Automation SaaS</a>
            <span id="navUsername" class="navbar-text text-light me-auto"></span>
            <button class="btn btn-outline-light" onclick="logout()">Cerrar sesión</button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // attempt to fill navbar username when script loads
        document.addEventListener('DOMContentLoaded', function () {
            const tok = localStorage.getItem('token');
            if (tok) {
                try {
                    const payload = JSON.parse(atob(tok.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
                    if (payload.sub) {
                        const span = document.getElementById('navUsername');
                        if (span) span.textContent = 'Bienvenido, ' + payload.sub;
                    }
                } catch (e) {
                    console.error('failed to parse token for navLabel', e);
                }
            }
        });
    </script>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
